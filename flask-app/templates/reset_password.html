{% extends 'base.html' %}
{% block title %}Reset Password — CatalogKit{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">&#9670;</div>
    <h1 class="auth-title">Set a new password</h1>
    <p class="auth-sub">Choose a new password for your account.</p>

    {% if error %}
    <div class="alert alert-error" style="margin-bottom:14px">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/reset-password/{{ token }}" class="auth-form">
      <div class="field">
        <label for="password">New password <span class="field-hint">min. 6 characters</span></label>
        <input type="password" id="password" name="password" placeholder="••••••••"
               required autocomplete="new-password" minlength="6">
      </div>
      <div class="field">
        <label for="password2">Confirm new password</label>
        <input type="password" id="password2" name="password2" placeholder="••••••••"
               required autocomplete="new-password" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
    </form>

    <p class="auth-switch">
      <a href="/forgot-password">Request a new link</a>
    </p>
  </div>
</div>
{% endblock %}
