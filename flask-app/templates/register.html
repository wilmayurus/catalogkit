{% extends 'base.html' %}
{% block title %}Sign Up — CatalogKit{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">&#9670;</div>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Free plan · 1 catalog included</p>

    <form method="POST" action="/register" class="auth-form">
      <div class="field">
        <label for="name">Your name</label>
        <input type="text" id="name" name="name" placeholder="Jane Smith" required autocomplete="name">
      </div>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password <span class="field-hint">min. 6 characters</span></label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create account</button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="/login">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
