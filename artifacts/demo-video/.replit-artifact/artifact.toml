kind = "web"
previewPath = "/demo-video/"
title = "CatalogKit Demo Video"
version = "1.0.0"
id = "artifacts/demo-video"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/demo-video/" ]
localPort = 24892

[services.development]
run = "pnpm --filter @workspace/demo-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/demo-video", "run", "build" ]
publicDir = "artifacts/demo-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24892"
BASE_PATH = "/demo-video/"
